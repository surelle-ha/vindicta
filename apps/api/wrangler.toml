name = "vindicta-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "vindicta-beta"
database_id = "YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_NAMESPACE_PREVIEW_ID"

[vars]
DOWNLOAD_BASE_URL = "https://vindicta.surelle.xyz"
ALLOWED_ORIGINS = "https://vindicta.surelle.xyz,http://localhost:3002"

# Set secrets via:
#   wrangler secret put RESEND_API_KEY
